name: 주간 포트폴리오 비교 데이터 수집

on:
  schedule:
    # 금요일 07:00 KST = UTC 목요일 22:00
    - cron: '0 22 * * 4'
  workflow_dispatch:

jobs:
  weekly-collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: 의존성 설치
        run: pip install -r collector/requirements.txt

      - name: Firebase 키 파일 생성
        env:
          FIREBASE_KEY_BASE64: ${{ secrets.FIREBASE_KEY_BASE64 }}
        run: echo "$FIREBASE_KEY_BASE64" | base64 --decode > collector/firebase-key.json

      - name: 주간 데이터 수집 및 AI 진단
        env:
          FIREBASE_PROJECT_ID: stockinvest-6cea8
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          KRX_ID:              ${{ secrets.KRX_ID }}
          KRX_PW:              ${{ secrets.KRX_PW }}
        run: python collector/weekly_collector.py

      - name: 키 파일 삭제 (보안)
        if: always()
        run: rm -f collector/firebase-key.json
