name: 섹터 히트맵 데이터 수집

on:
  schedule:
    # 평일 08:00 KST = UTC 일~목 23:00
    - cron: '0 23 * * 0-4'
  workflow_dispatch:   # GitHub 웹에서 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: 의존성 설치
        run: pip install -r collector/requirements.txt

      - name: Firebase 키 파일 생성
        env:
          FIREBASE_KEY_BASE64: ${{ secrets.FIREBASE_KEY_BASE64 }}
        run: echo "$FIREBASE_KEY_BASE64" | base64 --decode > collector/firebase-key.json

      - name: 데이터 수집 및 Firebase 업로드
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FIREBASE_PROJECT_ID: stockinvest-6cea8
          DASHBOARD_URL:      ${{ secrets.DASHBOARD_URL }}
        run: python collector/main.py --now

      - name: 키 파일 삭제 (보안)
        if: always()
        run: rm -f collector/firebase-key.json
